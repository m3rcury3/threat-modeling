site_name: SOC Detection Requirements
site_description: Blue Team detection requirements — source of truth for the Security Operations Centre.
site_url: https://m3rcury3.github.io/threat-modeling/
repo_url: https://github.com/m3rcury3/threat-modeling
repo_name: m3rcury3/threat-modeling
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Threat Actors:
      - Overview: actors/index.md
      - Muddywater (G0069): actors/muddywater.md
      - Generic Threats: actors/generic-threats.md
  - Tactics:
    - Overview: tactics/index.md
    - Initial Access (TA0001): tactics/initial-access.md
    - Execution (TA0002): tactics/execution.md
    - Credential Access (TA0006): tactics/credential-access.md
    - Command and Control (TA0011): tactics/command-and-control.md
    - Exfiltration (TA0010): tactics/exfiltration.md
  - Dashboards:
      - Coverage: dashboards/coverage.md
      - Gaps & Roadmap: dashboards/gaps.md
