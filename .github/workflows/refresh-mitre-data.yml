name: Refresh MITRE ATT&CK Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Refresh mapping from MITRE
        run: python scripts/refresh_mitre_mapping.py

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No mapping changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs/data
          git commit -m "chore: refresh MITRE ATT&CK mapping data"
          git push
